version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5

parameters:
  run-component-tests:
    description: If true, runs backend component tests. Always runs on main branch.
    type: boolean
    default: false
  delete-services:
    description: If true, deletes the Terraform resources in AWS.
    type: boolean
    default: false

terraform_version: &terraform_version "1.14.5"
terraform_docker_image: &terraform_docker_image "hashicorp/terraform:1.14"

executors:
  node-medium-executor:
    docker:
      - image: cimg/node:24.14
    resource_class: medium
  node-small-executor:
    docker:
      - image: cimg/node:24.14
    resource_class: small

workflows:
  build-deploy:
    when:
      and:
        - not: << pipeline.parameters.delete-services >>
        - not: << pipeline.parameters.run-component-tests >>
    jobs:
      - check-format-files
      - lint-typescript-code
      - build-backend
      - run-backend-unit-tests
      - run-frontend-tests
      - lint-terraform-code
      - deploy-backend-and-infrastructure:
          name: deploy-dev-backend-and-infrastructure
          output_file: terraform/terraform_output_dev
          tf_var_file: envs/dev.tfvars
          tf_workspace: pnp-app-dev
          requires:
            - check-format-files
            - lint-typescript-code
            - build-backend
            - run-backend-unit-tests
            - lint-terraform-code
      - build-frontend:
          name: build-dev-frontend
          dist_dir: frontend/dist-dev
          terraform_output_file: terraform/terraform_output_dev
          requires:
            - deploy-dev-backend-and-infrastructure
      - deploy-frontend:
          name: deploy-dev-frontend
          dist_dir: frontend/dist-dev
          terraform_output_file: terraform/terraform_output_dev
          requires:
            - check-format-files
            - lint-typescript-code
            - build-dev-frontend
            - run-frontend-tests
            - deploy-dev-backend-and-infrastructure
      - deploy-backend-and-infrastructure:
          name: deploy-prod-backend-and-infrastructure
          output_file: terraform/terraform_output_prod
          tf_var_file: envs/prod.tfvars
          tf_workspace: pnp-app-prod
          requires:
            - check-format-files
            - lint-typescript-code
            - build-backend
            - run-backend-unit-tests
            - lint-terraform-code
          filters:
            branches:
              only: main
      - run-backend-component-tests:
          tf_workspace: pnp-app-prod
          requires:
            - deploy-prod-backend-and-infrastructure
          filters:
            branches:
              only: main
      - build-frontend:
          name: build-prod-frontend
          dist_dir: frontend/dist-prod
          terraform_output_file: terraform/terraform_output_prod
          requires:
            - deploy-prod-backend-and-infrastructure
          filters:
            branches:
              only: main
      - deploy-frontend:
          name: deploy-prod-frontend
          dist_dir: frontend/dist-prod
          terraform_output_file: terraform/terraform_output_prod
          requires:
            - check-format-files
            - lint-typescript-code
            - build-prod-frontend
            - run-frontend-tests
            - deploy-prod-backend-and-infrastructure
          filters:
            branches:
              only: main

  component-tests:
    when:
      and:
        - not: << pipeline.parameters.delete-services >>
        - << pipeline.parameters.run-component-tests >>
    jobs:
      - run-backend-component-tests:
          tf_workspace: pnp-app-prod

  delete-services:
    when: << pipeline.parameters.delete-services >>
    jobs:
      - terraform-destroy:
          tf_var_file: envs/prod.tfvars
          tf_workspace: pnp-app-prod

jobs:
  check-format-files:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - install-terraform
      - run:
          name: Check file formatting
          command: npm run check-format

  lint-typescript-code:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Lint TypeScript code
          command: npm run lint

  build-backend:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Build backend
          command: |
            cd backend
            npm run build
      - persist_to_workspace:
          root: ~/project
          paths:
            - backend/build

  run-backend-unit-tests:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Run unit tests
          command: |
            cd backend
            npm run test:unit

  run-frontend-tests:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Run frontend tests
          command: |
            cd frontend
            npm run test

  lint-terraform-code:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm run install-lint-terraform
      - run:
          name: Lint Terraform code
          command: npm run lint:terraform

  run-backend-component-tests:
    parameters:
      tf_workspace:
        type: string
        default: pnp-app-prod
    executor: node-medium-executor
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Install dependencies
          command: npm ci
      - install-terraform
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=<< parameters.tf_workspace >>" >> "$BASH_ENV"
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Set environment variables for component tests
          command: |
            cd terraform
            terraform init -input=false

            # Create environment file for component tests
            echo "export COMPONENT_TESTS_COGNITO_REGION=$(terraform output aws_region)" >> terraform_output
            echo "export COMPONENT_TESTS_COGNITO_APP_CLIENT_ID=$(terraform output cognito_app_client_id)" >> terraform_output
            echo "export COMPONENT_TESTS_API_BASE_URL=$(terraform output api_versioned_url)" >> terraform_output
      - run:
          name: Run component tests
          command: |
            # Set environment variables for tests
            source ~/project/terraform/terraform_output

            cd backend
            npm run test:component

  # https://developer.hashicorp.com/terraform/tutorials/automation/circle-ci
  deploy-backend-and-infrastructure:
    parameters:
      output_file:
        type: string
        description: "Workspace-relative file that stores Terraform outputs for downstream jobs"
      tf_var_file:
        type: string
        description: "Path to environment-specific tfvars file"
      tf_workspace:
        type: string
        description: "Terraform Cloud workspace name for the target environment"
    docker:
      - image: *terraform_docker_image
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=<< parameters.tf_workspace >>" >> "$BASH_ENV"
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Terraform init
          command: |
            cd terraform
            terraform init -input=false
      - run:
          name: Terraform plan
          command: |
            cd terraform
            terraform plan -var-file=<< parameters.tf_var_file >> -out tfapply
      - run:
          name: Terraform apply
          command: |
            cd terraform
            terraform apply -auto-approve tfapply
      - run:
          name: Persist Terraform output for frontend
          command: |
            cd terraform

            rm -f ~/project/<< parameters.output_file >>

            echo "export VITE_COGNITO_REGION=$(terraform output aws_region)" >> ~/project/<< parameters.output_file >>
            echo "export VITE_COGNITO_APP_CLIENT_ID=$(terraform output cognito_app_client_id)" >> ~/project/<< parameters.output_file >>
            echo "export VITE_API_BASE_URL=$(terraform output api_versioned_url)" >> ~/project/<< parameters.output_file >>
            echo "export FRONTEND_BUCKET_NAME=$(terraform output frontend_bucket_name)" >> ~/project/<< parameters.output_file >>
            echo "export FRONTEND_BUCKET_REGION=$(terraform output aws_region)" >> ~/project/<< parameters.output_file >>
            echo "export CLOUDFRONT_DISTRIBUTION_ID=$(terraform output cloudfront_distribution_id)" >> ~/project/<< parameters.output_file >>
      - persist_to_workspace:
          root: ~/project
          paths:
            - << parameters.output_file >>

  build-frontend:
    parameters:
      dist_dir:
        type: string
        description: "Workspace-relative directory where the built frontend bundle is stored"
      terraform_output_file:
        type: string
        description: "Workspace-relative file containing Terraform outputs for the target environment"
    executor: node-medium-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Build frontend
          command: |
            source ~/project/<< parameters.terraform_output_file >>
            cd frontend
            npm run build
            rm -rf ~/project/<< parameters.dist_dir >>
            mv dist ~/project/<< parameters.dist_dir >>
      - persist_to_workspace:
          root: ~/project
          paths:
            - << parameters.dist_dir >>

  deploy-frontend:
    parameters:
      dist_dir:
        type: string
        description: "Workspace-relative directory that contains the frontend bundle to deploy"
      terraform_output_file:
        type: string
        description: "Workspace-relative file containing Terraform outputs for the target environment"
    executor: node-small-executor
    steps:
      - attach_workspace:
          at: ~/project
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Deploy frontend to S3
          command: |
            source ~/project/<< parameters.terraform_output_file >>
            aws s3 sync ~/project/<< parameters.dist_dir >> s3://$FRONTEND_BUCKET_NAME --delete --region $FRONTEND_BUCKET_REGION
      - run:
          name: Invalidate CloudFront cache
          command: |
            source ~/project/<< parameters.terraform_output_file >>
            aws cloudfront create-invalidation \
              --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
              --paths "/*"

  terraform-destroy:
    parameters:
      tf_var_file:
        type: string
        description: "Path to environment-specific tfvars file"
      tf_workspace:
        type: string
        description: "Terraform Cloud workspace name for the target environment"
    docker:
      - image: *terraform_docker_image
    resource_class: small
    steps:
      - checkout
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=<< parameters.tf_workspace >>" >> "$BASH_ENV"
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Terraform init
          command: |
            cd terraform
            terraform init -input=false
      - run:
          name: Terraform plan destroy
          command: |
            cd terraform
            terraform plan -var-file=<< parameters.tf_var_file >> -destroy -out tfdestroy
      - run:
          name: Terraform destroy
          command: |
            cd terraform
            terraform apply -auto-approve tfdestroy

commands:
  install-terraform:
    description: Install Terraform using the version specified in terraform_version anchor
    parameters:
      version:
        type: string
        default: *terraform_version
    steps:
      - run:
          name: Install Terraform
          command: |
            TF_VER=<< parameters.version >>
            TEMP_DIR=$(mktemp -d)
            curl --fail --location --output ${TEMP_DIR}/terraform.zip https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip
            unzip ${TEMP_DIR}/terraform.zip -d ${TEMP_DIR}
            sudo mv ${TEMP_DIR}/terraform /usr/local/bin/
            terraform -version
            rm -rf ${TEMP_DIR}
