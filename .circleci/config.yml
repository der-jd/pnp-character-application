version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5

parameters:
  run-component-tests:
    description: If true, runs backend component tests for the specified environment. Always runs on main branch for prod.
    type: boolean
    default: false
  delete-services:
    description: If true, deletes the Terraform resources in AWS for the specified environment.
    type: boolean
    default: false
  deploy-shared:
    description: If true, deploys the shared infrastructure (Route53 hosted zone). Use when terraform/shared/ files change.
    type: boolean
    default: false
  env:
    description: Target environment (dev or prod)
    type: enum
    enum: [dev, prod]
    default: dev

terraform_version: &terraform_version "1.14.5"
terraform_docker_image: &terraform_docker_image "hashicorp/terraform:1.14"

executors:
  node-medium-executor:
    docker:
      - image: cimg/node:24.14
    resource_class: medium
  node-small-executor:
    docker:
      - image: cimg/node:24.14
    resource_class: small

workflows:
  build-deploy-dev:
    when:
      and:
        - not: << pipeline.parameters.delete-services >>
        - not: << pipeline.parameters.run-component-tests >>
        - not: << pipeline.parameters.deploy-shared >>
    jobs:
      - check-format-files
      - lint-typescript-code
      - build-backend
      - run-backend-unit-tests
      - run-frontend-tests
      - lint-terraform-code
      - deploy-backend-and-app-infrastructure:
          name: deploy-backend-and-app-infrastructure-dev
          env: dev
          requires:
            - check-format-files
            - lint-typescript-code
            - build-backend
            - run-backend-unit-tests
            - lint-terraform-code
      - build-frontend:
          name: build-frontend-dev
          env: dev
          requires:
            - deploy-backend-and-app-infrastructure-dev
      - deploy-frontend:
          name: deploy-frontend-dev
          env: dev
          requires:
            - check-format-files
            - lint-typescript-code
            - build-frontend-dev
            - run-frontend-tests
            - deploy-backend-and-app-infrastructure-dev

  build-deploy-prod:
    when:
      and:
        - equal: [main, << pipeline.git.branch >>]
        - not: << pipeline.parameters.delete-services >>
        - not: << pipeline.parameters.run-component-tests >>
        - not: << pipeline.parameters.deploy-shared >>
    jobs:
      - check-format-files
      - lint-typescript-code
      - build-backend
      - run-backend-unit-tests
      - run-frontend-tests
      - lint-terraform-code
      - deploy-backend-and-app-infrastructure:
          name: deploy-backend-and-app-infrastructure-prod
          env: prod
          requires:
            - check-format-files
            - lint-typescript-code
            - build-backend
            - run-backend-unit-tests
            - lint-terraform-code
      - run-backend-component-tests:
          name: run-backend-component-tests-prod
          env: prod
          requires:
            - deploy-backend-and-app-infrastructure-prod
      - build-frontend:
          name: build-frontend-prod
          env: prod
          requires:
            - deploy-backend-and-app-infrastructure-prod
      - deploy-frontend:
          name: deploy-frontend-prod
          env: prod
          requires:
            - check-format-files
            - lint-typescript-code
            - build-frontend-prod
            - run-frontend-tests
            - deploy-backend-and-app-infrastructure-prod

  deploy-shared:
    when: << pipeline.parameters.deploy-shared >>
    jobs:
      - check-format-files
      - lint-terraform-code
      - deploy-shared-infrastructure:
          requires:
            - check-format-files
            - lint-terraform-code

  component-tests:
    when:
      and:
        - not: << pipeline.parameters.delete-services >>
        - << pipeline.parameters.run-component-tests >>
    jobs:
      - run-backend-component-tests:
          name: run-backend-component-tests-<< pipeline.parameters.env >>
          env: << pipeline.parameters.env >>

  delete-services:
    when: << pipeline.parameters.delete-services >>
    jobs:
      - terraform-destroy:
          name: terraform-destroy-<< pipeline.parameters.env >>
          env: << pipeline.parameters.env >>

jobs:
  check-format-files:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - install-terraform
      - run:
          name: Check file formatting
          command: npm run check-format

  lint-typescript-code:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Lint TypeScript code
          command: npm run lint

  build-backend:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Build backend
          command: |
            cd backend
            npm run build
      - persist_to_workspace:
          root: ~/project
          paths:
            - backend/build

  run-backend-unit-tests:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Run unit tests
          command: |
            cd backend
            npm run test:unit

  run-frontend-tests:
    executor: node-medium-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Run frontend tests
          command: |
            cd frontend
            npm run test

  lint-terraform-code:
    executor: node-small-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm run install-lint-terraform
      - run:
          name: Lint Terraform code
          command: npm run lint:terraform

  run-backend-component-tests:
    parameters:
      env:
        type: enum
        enum: [dev, prod]
    executor: node-medium-executor
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Install dependencies
          command: npm ci
      - install-terraform
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=${TF_WORKSPACE_<< parameters.env >>}" >> "$BASH_ENV"
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Set environment variables for component tests
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform init -input=false

            echo "export COMPONENT_TESTS_COGNITO_REGION=$(terraform output aws_region)" >> terraform_output_<< parameters.env >>
            echo "export COMPONENT_TESTS_COGNITO_APP_CLIENT_ID=$(terraform output cognito_app_client_id)" >> terraform_output_<< parameters.env >>
            echo "export COMPONENT_TESTS_API_BASE_URL=$(terraform output api_versioned_url)" >> terraform_output_<< parameters.env >>
            echo "export COMPONENT_TESTS_COGNITO_USERNAME=${COMPONENT_TESTS_COGNITO_USERNAME_<< parameters.env >>}" >> "$BASH_ENV"
            echo "export COMPONENT_TESTS_COGNITO_PASSWORD=${COMPONENT_TESTS_COGNITO_PASSWORD_<< parameters.env >>}" >> "$BASH_ENV"
      - run:
          name: Run component tests
          command: |
            source ~/project/terraform/app/terraform_output_<< parameters.env >>
            source $BASH_ENV

            cd backend
            npm run test:component

  # https://developer.hashicorp.com/terraform/tutorials/automation/circle-ci
  deploy-shared-infrastructure:
    docker:
      - image: *terraform_docker_image
    resource_class: small
    steps:
      - checkout
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=$TF_WORKSPACE_shared" >> "$BASH_ENV"
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Terraform init
          command: |
            source $BASH_ENV

            cd terraform/shared
            terraform init -input=false
      - run:
          name: Terraform plan
          command: |
            source $BASH_ENV

            cd terraform/shared
            terraform plan -var-file=variables/common.tfvars -out tfapply
      - run:
          name: Terraform apply
          command: |
            source $BASH_ENV

            cd terraform/shared
            terraform apply -auto-approve tfapply

  deploy-backend-and-app-infrastructure:
    parameters:
      env:
        type: enum
        enum: [dev, prod]
    docker:
      - image: *terraform_docker_image
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=${TF_WORKSPACE_<< parameters.env >>}" >> "$BASH_ENV"
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Terraform init
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform init -input=false
      - run:
          name: Terraform plan
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform plan -var-file=variables/common.tfvars -var-file=variables/<< parameters.env >>.tfvars -out tfapply
      - run:
          name: Terraform apply
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform apply -auto-approve tfapply
      - run:
          name: Persist Terraform output for frontend
          command: |
            source $BASH_ENV

            cd terraform/app

            rm -f ~/project/terraform/app/terraform_output_<< parameters.env >>

            echo "export VITE_COGNITO_REGION=$(terraform output aws_region)" >> ~/project/terraform/app/terraform_output_<< parameters.env >>
            echo "export VITE_COGNITO_APP_CLIENT_ID=$(terraform output cognito_app_client_id)" >> ~/project/terraform/app/terraform_output_<< parameters.env >>
            echo "export VITE_API_BASE_URL=$(terraform output api_versioned_url)" >> ~/project/terraform/app/terraform_output_<< parameters.env >>
            echo "export FRONTEND_BUCKET_NAME=$(terraform output frontend_bucket_name)" >> ~/project/terraform/app/terraform_output_<< parameters.env >>
            echo "export FRONTEND_BUCKET_REGION=$(terraform output aws_region)" >> ~/project/terraform/app/terraform_output_<< parameters.env >>
      - persist_to_workspace:
          root: ~/project
          paths:
            - terraform/app/terraform_output_<< parameters.env >>

  build-frontend:
    parameters:
      env:
        type: enum
        enum: [dev, prod]
    executor: node-medium-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Build api-spec package
          command: |
            cd api-spec
            npm run build
      - run:
          name: Build frontend
          command: |
            source ~/project/terraform/app/terraform_output_<< parameters.env >>
            cd frontend
            npm run build
            rm -rf ~/project/frontend/dist-<< parameters.env >>
            mv dist ~/project/frontend/dist-<< parameters.env >>
      - persist_to_workspace:
          root: ~/project
          paths:
            - frontend/dist-<< parameters.env >>

  deploy-frontend:
    parameters:
      env:
        type: enum
        enum: [dev, prod]
    executor: node-small-executor
    steps:
      - attach_workspace:
          at: ~/project
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Deploy frontend to S3
          command: |
            source ~/project/terraform/app/terraform_output_<< parameters.env >>
            aws s3 sync ~/project/frontend/dist-<< parameters.env >> s3://$FRONTEND_BUCKET_NAME --delete --region $FRONTEND_BUCKET_REGION

  terraform-destroy:
    parameters:
      env:
        type: enum
        enum: [dev, prod]
    docker:
      - image: *terraform_docker_image
    resource_class: small
    steps:
      - checkout
      - run:
          name: Select Terraform Cloud workspace
          command: echo "export TF_WORKSPACE=${TF_WORKSPACE_<< parameters.env >>}" >> "$BASH_ENV"
      - aws-cli/setup:
          role_arn: "$AWS_ROLE_ARN"
      - run:
          name: Terraform init
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform init -input=false
      - run:
          name: Remove protected resources from state
          command: |
            source $BASH_ENV

            cd terraform/app
            echo "The following resources will be removed from Terraform state and NOT destroyed:"
            failed_resources=""
            for resource in \
              aws_dynamodb_table.characters \
              aws_dynamodb_table.characters_history \
              aws_backup_vault.vault \
              aws_cognito_user_pool.pnp_user_pool; do
              echo "  - $resource"
              if ! output=$(terraform state rm "$resource" 2>&1); then
                if echo "$output" | grep -q "No matching objects found"; then
                  echo "    [skipped] Not in state"
                else
                  echo "    [ERROR] $output"
                  failed_resources="$failed_resources $resource"
                fi
              fi
            done
            echo ""
            if [ -n "$failed_resources" ]; then
              echo "ERROR: Failed to remove resources from state:$failed_resources"
              exit 1
            fi
            echo "These resources still exist in AWS and must be removed manually if needed."
      - run:
          name: Terraform plan destroy
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform plan -var-file=variables/common.tfvars -var-file=variables/<< parameters.env >>.tfvars -destroy -out tfdestroy
      - run:
          name: Terraform destroy
          command: |
            source $BASH_ENV

            cd terraform/app
            terraform apply -auto-approve tfdestroy

commands:
  install-terraform:
    description: Install Terraform using the version specified in terraform_version anchor
    parameters:
      version:
        type: string
        default: *terraform_version
    steps:
      - run:
          name: Install Terraform
          command: |
            TF_VER=<< parameters.version >>
            TEMP_DIR=$(mktemp -d)
            curl --fail --location --output ${TEMP_DIR}/terraform.zip https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip
            unzip ${TEMP_DIR}/terraform.zip -d ${TEMP_DIR}
            sudo mv ${TEMP_DIR}/terraform /usr/local/bin/
            terraform -version
            rm -rf ${TEMP_DIR}
